graph_max_neighbors_per_entity: 20  # 同实体内连边采样上限
expected_fraud_rate: 0.035
fraud_rate_tol: 0.01
build_hetero_graph: true    # Stage 3a NEW: when true, build_all() also produces hetero_graph.pt
