batch_size: 1024
lr: 0.001
weight_decay: 0.0001          # Stage 3a v2: was 1e-5, raised to standard AdamW value
epochs: 80                    # Stage 3a v2: was 40, raised so cosine has room to anneal
warmup_steps: 500
grad_clip: 1.0
seed: 42
neighbor_sample: [15, 10]
focal_gamma_pos: 1.0
focal_gamma_neg: 4.0
focal_alpha: 0.25
hnm_neg_pos_ratio: 3.0
early_stop_patience: 12       # Stage 3a v2: was 8, raised to tolerate cosine-decay temporary dips
min_epochs: 10
label_smoothing_eps: 0.1
cosine_eta_min_ratio: 0.01    # Stage 3a v2 NEW: cosine LR floor = peak * this ratio (default 1%)
